<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tanza — Tenant Experience Survey</title>
  <style>
    :root {
      --tanza-orange: #FF6B35;
      --tanza-dark: #1B1B2F;
      --tanza-grey: #6B7280;
      --tanza-bg: #F7F7F9;
      --tanza-border: #E4E4E9;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      background: var(--tanza-bg);
      color: var(--tanza-dark);
    }
    .wrap { max-width: 720px; margin: 0 auto; padding: 24px 16px 80px; }

    .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
    .brand-mark {
      width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .brand-mark img { width: 100%; height: 100%; object-fit: contain; }
    .brand-name { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
    .brand-sub { font-size: 13px; color: var(--tanza-grey); margin: 2px 0 24px; }

    .progress-track {
      height: 8px; background: var(--tanza-border); border-radius: 99px;
      overflow: hidden; margin-bottom: 6px;
    }
    .progress-fill {
      height: 100%; background: var(--tanza-orange); width: 0%;
      transition: width .3s ease;
    }
    .progress-label { font-size: 12px; color: var(--tanza-grey); margin-bottom: 20px; }

    .card {
      background: #fff; border: 1px solid var(--tanza-border); border-radius: 16px;
      padding: 24px 20px; box-shadow: 0 1px 3px rgba(0,0,0,.04);
    }
    .section-title { font-size: 18px; font-weight: 700; margin: 0 0 4px; }
    .section-index { font-size: 12px; color: var(--tanza-orange); font-weight: 700; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; }

    .field { margin: 22px 0; }
    .q-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
    .field label.q { display: block; font-size: 14px; font-weight: 600; line-height: 1.4; margin-bottom: 0; }
    .field .help { font-size: 12px; color: var(--tanza-grey); margin: -4px 0 8px; }
    .mic-toggle {
      flex-shrink: 0; width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--tanza-border);
      background: #fff; color: var(--tanza-grey); cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center; transition: all .15s;
    }
    .mic-toggle:hover { border-color: var(--tanza-orange); color: var(--tanza-orange); }
    .mic-toggle.active { background: var(--tanza-orange); border-color: var(--tanza-orange); color: #fff; }
    .voice-answer-box { border: 1px solid var(--tanza-border); border-radius: 10px; padding: 12px; background: #fafafa; }
    .voice-switch-hint { font-size: 12px; color: var(--tanza-grey); margin-top: 6px; }
    .voice-switch-hint a { color: var(--tanza-orange); cursor: pointer; text-decoration: underline; }
    .field input[type=text], .field textarea {
      width: 100%; border: 1px solid var(--tanza-border); border-radius: 10px;
      padding: 10px 12px; font-size: 14px; font-family: inherit; background: #fff;
      transition: border-color .15s;
    }
    .field textarea { min-height: 84px; resize: vertical; }
    .field input[type=text]:focus, .field textarea:focus {
      outline: none; border-color: var(--tanza-orange);
      box-shadow: 0 0 0 3px rgba(255,107,53,.12);
    }

    .choice-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .choice-pill {
      border: 1px solid var(--tanza-border); border-radius: 99px; padding: 8px 14px;
      font-size: 13px; cursor: pointer; user-select: none; background: #fff;
      transition: all .15s;
    }
    .choice-pill.selected { background: var(--tanza-orange); border-color: var(--tanza-orange); color: #fff; }

    .upload-box {
      border: 2px dashed var(--tanza-border); border-radius: 12px; padding: 18px;
      text-align: center; cursor: pointer; transition: border-color .15s; background: #fafafa;
    }
    .upload-box:hover, .upload-box.drag { border-color: var(--tanza-orange); background: #fff5f0; }
    .upload-box input { display: none; }
    .upload-hint { font-size: 12px; color: var(--tanza-grey); margin-top: 4px; }
    .file-chip {
      display: inline-flex; align-items: center; gap: 6px; margin-top: 10px;
      background: #fff5f0; border: 1px solid #ffd9c4; color: #b8461e;
      border-radius: 8px; padding: 6px 10px; font-size: 12px;
    }
    .file-chip button {
      border: none; background: none; color: #b8461e; cursor: pointer; font-weight: 700;
    }

    .voice-box { display: flex; align-items: center; gap: 12px; }
    .mic-btn {
      width: 48px; height: 48px; border-radius: 50%; border: none; cursor: pointer;
      background: var(--tanza-orange); color: #fff; font-size: 18px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; transition: transform .15s;
    }
    .mic-btn.recording { background: #E23744; animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(226,55,68,.4);} 70%{box-shadow:0 0 0 12px rgba(226,55,68,0);} 100%{box-shadow:0 0 0 0 rgba(226,55,68,0);} }
    .voice-status { font-size: 13px; color: var(--tanza-grey); }
    audio.voice-preview { height: 32px; margin-top: 8px; width: 100%; }
    .or-divider { font-size: 12px; color: var(--tanza-grey); margin: 10px 0; text-align: center; }

    .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; }
    .btn {
      border: none; border-radius: 10px; padding: 12px 22px; font-size: 14px;
      font-weight: 700; cursor: pointer; transition: opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--tanza-orange); color: #fff; }
    .btn-ghost { background: transparent; color: var(--tanza-grey); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .req-flag { color: #E23744; margin-left: 3px; }

    .screen { display: none; }
    .screen.active { display: block; animation: fadeIn .25s ease; }
    @keyframes fadeIn { from { opacity:0; transform: translateY(6px);} to {opacity:1; transform:none;} }

    .welcome-wrap { text-align: center; padding: 20px 12px 8px; }
    .welcome-logo { width: 84px; height: 84px; margin: 0 auto 18px; }
    .welcome-logo img { width: 100%; height: 100%; object-fit: contain; }
    .welcome-title { font-size: 22px; font-weight: 800; margin: 0 0 4px; letter-spacing: -0.3px; }
    .welcome-powered { font-size: 12px; color: var(--tanza-grey); font-weight: 600; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 22px; }
    .welcome-body { font-size: 14.5px; line-height: 1.7; color: var(--tanza-dark); text-align: left; background: #fafafa; border: 1px solid var(--tanza-border); border-radius: 12px; padding: 18px 20px; margin-bottom: 24px; }
    .welcome-body strong { color: var(--tanza-orange); }
    .welcome-tip {
      display: flex; align-items: flex-start; gap: 10px; text-align: left;
      background: #fff5f0; border: 1px solid #ffd9c4; border-radius: 12px;
      padding: 14px 16px; margin-bottom: 24px; font-size: 13.5px; line-height: 1.6; color: var(--tanza-dark);
    }
    .welcome-tip .tip-icon {
      flex-shrink: 0; width: 30px; height: 30px; border-radius: 50%; background: var(--tanza-orange);
      color: #fff; display: flex; align-items: center; justify-content: center; font-size: 14px;
    }
    .welcome-start-row { display: flex; justify-content: flex-end; }

    .done-wrap { text-align: center; padding: 60px 20px; }
    .done-check {
      width: 64px; height: 64px; border-radius: 50%; background: #E8F7EE; color: #1E9E5A;
      font-size: 32px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px;
    }
    .error-box {
      background: #FFF0F0; border: 1px solid #FFD0D0; color: #B8271E;
      border-radius: 10px; padding: 12px; font-size: 13px; margin-top: 14px;
    }
    .spinner {
      width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff; border-radius: 50%; display: inline-block;
      animation: spin .7s linear infinite; margin-right: 8px; vertical-align: -2px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

function renderScreen() {
  if (showWelcome) return renderWelcome();
  var s = SECTIONS[current];
  var card = document.getElementById('formCard');
  var html = '<div class="section-index">Section ' + (current+1) + ' of ' + SECTIONS.length + '</div>';
  html += '<h2 class="section-title">' + s.title + '</h2>';

  s.fields.forEach(function(f) {
    var voiceCapable = f.type === 'text' || f.type === 'textarea' || f.type === 'radio' || f.type === 'checkbox' || f.type === 'voice';
    var inVoiceMode = voiceCapable && (voiceMode[f.key] || (f.type === 'voice' && voiceMode[f.key] !== false));

    html += '<div class="field" data-key="' + f.key + '">';
    html += '<div class="q-row"><label class="q">' + f.q + (f.required ? '<span class="req-flag">*</span>' : '') + '</label>';
    if (voiceCapable) {
      html += '<button type="button" class="mic-toggle' + (inVoiceMode ? ' active' : '') + '" title="' + (inVoiceMode ? 'Switch to typing' : 'Switch to voice answer') + '" onclick="toggleFieldVoiceMode(\'' + f.key + '\')">&#127908;</button>';
    }
    html += '</div>';
    if (f.help) html += '<div class="help">' + f.help + '</div>';

    if (voiceCapable && inVoiceMode) {
      html += renderVoiceBox(f);
    } else if (f.type === 'text') {
      html += '<input type="text" id="in_' + f.key + '" value="' + (esc(answers[f.key]) || '') + '">';
    } else if (f.type === 'textarea' || f.type === 'voice') {
      html += '<textarea id="in_' + f.key + '">' + (esc(answers[f.key]) || '') + '</textarea>';
    } else if (f.type === 'radio' || f.type === 'checkbox') {
      html += '<div class="choice-row" id="in_' + f.key + '">';
      f.options.forEach(function(opt) {
        var selected = isSelected(f, opt);
        html += '<div class="choice-pill' + (selected ? ' selected' : '') + '" data-value="' + esc(opt) + '" onclick="toggleChoice(\'' + f.key + '\',\'' + f.type + '\',this)">' + opt + '</div>';
      });
      html += '</div>';
    } else if (f.type === 'file') {
      html += renderFileBox(f);
    }
    html += '</div>';
  });

  card.innerHTML = html;
  attachTextListeners(s);
  updateProgress();
  document.getElementById('formCard').insertAdjacentHTML('beforeend', navHtml());
  document.getElementById('backBtn').onclick = goBack;
  document.getElementById('nextBtn').onclick = goNext;
}

function renderWelcome() {
  document.getElementById('progressTrack').style.display = 'none';
  document.getElementById('progressLabel').style.display = 'none';

  var card = document.getElementById('formCard');
  card.innerHTML =
    '<div class="welcome-wrap">' +
      '<div class="welcome-logo"><img src="' + LOGO_DATA_URI + '" alt="Takhaial"></div>' +
      '<h1 class="welcome-title">Tanza — Tenant Experience Survey</h1>' +
      '<div class="welcome-powered">Powered by Takhaial</div>' +
      '<div class="welcome-body">' +
        "Thank you for helping us build Tanza's AI guide. Your answers train the assistant that recommends your venue to guests and helps them find, book, and enjoy it. " +
        'Please answer as fully as you can — where something doesn\'t apply, just write "N/A".' +
      '</div>' +
      '<div class="welcome-tip">' +
        '<div class="tip-icon">&#127908;</div>' +
        '<div>In a hurry or prefer talking? Look for the <strong>mic icon</strong> next to any question — tap it to record your answer by voice instead of typing. You can switch back to typing at any time.</div>' +
      '</div>' +
      '<div class="welcome-start-row"><button class="btn btn-primary" id="startBtn">Start the survey →</button></div>' +
    '</div>';
  document.getElementById('startBtn').onclick = function() {
    showWelcome = false;
    document.getElementById('progressTrack').style.display = '';
    document.getElementById('progressLabel').style.display = '';
    renderScreen();
    window.scrollTo(0,0);
  };
}

function navHtml() {
  var isLast = current === SECTIONS.length - 1;
  return '<div class="nav-row">' +
    '<button class="btn btn-ghost" id="backBtn">&larr; Back</button>' +
    '<button class="btn btn-primary" id="nextBtn">' + (isLast ? 'Submit' : 'Next →') + '</button>' +
    '</div>';
}

function esc(v) {
  if (v === undefined || v === null) return '';
  return String(v).replace(/"/g, '&quot;').replace(/</g, '&lt;');
}

function isSelected(f, opt) {
  var v = answers[f.key];
  if (f.type === 'checkbox') return Array.isArray(v) && v.indexOf(opt) !== -1;
  return v === opt;
}

function toggleChoice(key, type, el) {
  var opt = el.getAttribute('data-value');
  if (type === 'radio') {
    var row = el.parentElement;
    Array.prototype.forEach.call(row.children, function(c){ c.classList.remove('selected'); });
    el.classList.add('selected');
    answers[key] = opt;
  } else {
    var cur = Array.isArray(answers[key]) ? answers[key].slice() : [];
    var idx = cur.indexOf(opt);
    if (idx === -1) { cur.push(opt); el.classList.add('selected'); }
    else { cur.splice(idx,1); el.classList.remove('selected'); }
    answers[key] = cur;
  }
}

function attachTextListeners(s) {
  s.fields.forEach(function(f) {
    if (f.type === 'text' || f.type === 'textarea' || f.type === 'voice') {
      var el = document.getElementById('in_' + f.key);
      if (el) el.addEventListener('input', function() { answers[f.key] = el.value; });
    }
  });
}

// ---- File upload (image / PDF) ----
function renderFileBox(f) {
  var existing = answers[f.key];
  var acceptsPdf = f.accept && f.accept.indexOf('pdf') !== -1;
  var acceptsImage = !f.accept || f.accept.indexOf('image') !== -1;
  var hint = acceptsPdf && acceptsImage ? 'Image or PDF' : (acceptsPdf ? 'PDF' : 'Image');
  var box = '<div class="upload-box" id="box_' + f.key + '" onclick="document.getElementById(\'file_' + f.key + '\').click()">' +
    '<div>&#128193; Click to choose a file, or drag it here</div>' +
    '<div class="upload-hint">' + hint + ' — up to ~10MB</div>' +
    '<input type="file" id="file_' + f.key + '" accept="' + (f.accept||'') + '">' +
    '</div>' +
    '<div id="chip_' + f.key + '">' + (existing ? fileChipHtml(f.key, existing.name) : '') + '</div>';
  setTimeout(function() {
    var input = document.getElementById('file_' + f.key);
    var dropBox = document.getElementById('box_' + f.key);
    input.addEventListener('change', function(e) { handleFile(f.key, e.target.files[0]); });
    ['dragover','dragleave','drop'].forEach(function(evt) {
      dropBox.addEventListener(evt, function(e) {
        e.preventDefault();
        dropBox.classList.toggle('drag', evt === 'dragover');
        if (evt === 'drop' && e.dataTransfer.files[0]) handleFile(f.key, e.dataTransfer.files[0]);
      });
    });
  }, 0);
  return box;
}

function fileChipHtml(key, name) {
  return '<div class="file-chip">&#128206; ' + esc(name) + ' <button onclick="clearFile(\'' + key + '\')">&times;</button></div>';
}

function clearFile(key) {
  delete answers[key];
  document.getElementById('chip_' + key).innerHTML = '';
}

function handleFile(key, file) {
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function() {
    var base64 = reader.result.split(',')[1];
    answers[key] = { name: file.name, mimeType: file.type || 'application/octet-stream', base64: base64 };
    document.getElementById('chip_' + key).innerHTML = fileChipHtml(key, file.name);
  };
  reader.readAsDataURL(file);
}

// ---- Voice recording (per-question toggle between typing and speaking) ----
function toggleFieldVoiceMode(key) {
  var wasVoice = !!voiceMode[key];
  voiceMode[key] = !wasVoice;
  if (voiceMode[key]) {
    // switching to voice mode: drop any typed/chosen answer for this field
    delete answers[key];
  } else {
    // switching back to typing: drop any recorded answer for this field
    delete answers[key];
  }
  renderScreen();
}

function renderVoiceBox(f) {
  var hasVoice = answers[f.key] && answers[f.key].base64;
  return '<div class="voice-answer-box"><div class="voice-box">' +
    '<button type="button" class="mic-btn" id="mic_' + f.key + '" onclick="toggleRecording(\'' + f.key + '\')">&#127908;</button>' +
    '<div><div class="voice-status" id="status_' + f.key + '">' + (hasVoice ? 'Recording saved' : 'Tap the mic to record your answer') + '</div>' +
    (hasVoice ? '<audio class="voice-preview" controls src="data:' + answers[f.key].mimeType + ';base64,' + answers[f.key].base64 + '"></audio>' : '') +
    '</div></div>' +
    '<div class="voice-switch-hint">Prefer to type? <a onclick="toggleFieldVoiceMode(\'' + f.key + '\')">Switch back to typing</a></div>' +
    '</div>';
}

function toggleRecording(key) {
  var btn = document.getElementById('mic_' + key);
  if (btn.classList.contains('recording')) {
    mediaRecorder.stop();
    return;
  }
  if (!navigator.mediaDevices) {
    document.getElementById('status_' + key).textContent = 'Voice recording not supported in this browser — use "Switch back to typing" below.';
    return;
  }
  navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream) {
    activeStream = stream;
    audioChunks = [];
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = function(e) { audioChunks.push(e.data); };
    mediaRecorder.onstop = function() {
      var blob = new Blob(audioChunks, { type: 'audio/webm' });
      var reader = new FileReader();
      reader.onload = function() {
        var base64 = reader.result.split(',')[1];
        answers[key] = { name: key + '.webm', mimeType: 'audio/webm', base64: base64 };
        document.getElementById('status_' + key).textContent = 'Recording saved (' + Math.round(blob.size/1024) + ' KB)';
        var box = btn.parentElement.parentElement;
        var existingAudio = box.querySelector('audio');
        if (existingAudio) existingAudio.remove();
        var audioEl = document.createElement('audio');
        audioEl.className = 'voice-preview'; audioEl.controls = true;
        audioEl.src = 'data:audio/webm;base64,' + base64;
        document.getElementById('status_' + key).insertAdjacentElement('afterend', audioEl);
      };
      reader.readAsDataURL(blob);
      activeStream.getTracks().forEach(function(t){ t.stop(); });
      btn.classList.remove('recording');
    };
    mediaRecorder.start();
    btn.classList.add('recording');
    document.getElementById('status_' + key).textContent = 'Recording... tap again to stop';
  }).catch(function() {
    document.getElementById('status_' + key).textContent = 'Microphone access denied — use "Switch back to typing" below.';
  });
}

// ---- Navigation & progress ----
function updateProgress() {
  var pct = Math.round(((current) / SECTIONS.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = 'Section ' + (current+1) + ' of ' + SECTIONS.length + ' — ' + SECTIONS[current].title;
}

function validateSection(s) {
  for (var i=0;i<s.fields.length;i++) {
    var f = s.fields[i];
    if (!f.required) continue;
    var v = answers[f.key];
    if (f.type === 'checkbox' && !voiceMode[f.key]) { if (!v || v.length===0) return f; }
    else if (!v) return f;
  }
  return null;
}

function goNext() {
  var s = SECTIONS[current];
  var missing = validateSection(s);
  if (missing) {
    alert('Please answer: "' + missing.q + '" before continuing.');
    return;
  }
  if (current < SECTIONS.length - 1) {
    current++;
    renderScreen();
    window.scrollTo(0,0);
  } else {
    submitAll();
  }
}

function goBack() {
  if (current > 0) {
    current--;
    renderScreen();
  } else {
    showWelcome = true;
    document.getElementById('progressTrack').style.display = 'none';
    document.getElementById('progressLabel').style.display = 'none';
    renderScreen();
  }
  window.scrollTo(0,0);
}

function submitAll() {
  var card = document.getElementById('formCard');
  var nextBtn = document.getElementById('nextBtn');
  nextBtn.disabled = true;
  document.getElementById('backBtn').disabled = true;
  nextBtn.innerHTML = '<span class="spinner"></span> Submitting...';

  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    // text/plain avoids a CORS preflight request, which Apps Script Web Apps don't support
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(answers)
  })
    .then(function(resp) { return resp.json(); })
    .then(function(res) {
      if (res.ok) {
        showDone();
      } else {
        showError(res.error || 'Unknown error');
      }
    })
    .catch(function(err) {
      showError(err.message || String(err));
    });
}

function showDone() {
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('formCard').innerHTML =
    '<div class="done-wrap">' +
    '<div class="done-check">&#10003;</div>' +
    '<h2>Thank you!</h2>' +
    '<p style="color:var(--tanza-grey)">Your venue details have been submitted. Our team will reach out if anything needs clarifying.</p>' +
    '</div>';
}

function showError(msg) {
  var card = document.getElementById('formCard');
  var existing = card.querySelector('.error-box');
  if (existing) existing.remove();
  card.insertAdjacentHTML('beforeend', '<div class="error-box">Submission failed: ' + esc(msg) + '. Please try again.</div>');
  var nextBtn = document.getElementById('nextBtn');
  nextBtn.disabled = false;
  document.getElementById('backBtn').disabled = false;
  nextBtn.textContent = 'Submit';
}

renderScreen();
</script>
</body>
</html>
